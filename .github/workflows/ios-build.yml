name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: |
          chmod +x node_modules/.bin/*
          find node_modules/react-native/scripts -name "*.sh" -exec chmod +x {} \;
          echo "Permissions fixed"

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install --clean

      - name: Install CocoaPods with codegen
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          export RCT_NEW_ARCH_ENABLED=1
          export NODE_BINARY="$(which node)"
          pod install --repo-update

      - name: Verify codegen output
        run: |
          echo "=== Generated codegen files ==="
          find ios/build/generated -type f 2>/dev/null | head -30 || echo "WARNING: No codegen files generated!"
          echo "=== Codegen file count ==="
          find ios/build/generated -type f 2>/dev/null | wc -l || echo "0"

      - name: Build archive
        run: |
          cd ios
          WORKSPACE="$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)"
          SCHEME="$(xcodebuild -list -workspace "$WORKSPACE" -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")"
          echo "Workspace: $WORKSPACE, Scheme: $SCHEME"
          NODE_PATH="$(which node)"
          echo "Node binary: $NODE_PATH"
          export RCT_NO_LAUNCH_PACKAGER=true
          export NODE_OPTIONS="--max_old_space_size=8192"
          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            -UseModernBuildSystem=NO \
            NODE_BINARY="$NODE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee xcodebuild.log | grep -v "^note: " | grep -v "^warning: " | tail -300
          XCODE_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "========== xcodebuild exit code: $XCODE_EXIT =========="
          echo ""
          if [ "$XCODE_EXIT" -ne 0 ]; then
            echo "========== ALL FATAL ERRORS =========="
            grep -i -E "(error:|Undefined symbol|CodeSign|Provisioning|CompileSwift|PhaseScriptExecution|Metro bundle|Hermes|React-Codegen|module not found|fatal error|ld:|clang:|linker command failed|ARCHIVE FAILED|The following build commands failed)" xcodebuild.log | head -100 || echo "(no matching patterns)"
            echo ""
            echo "========== LAST 300 LINES (full, unfiltered) =========="
            tail -300 xcodebuild.log
          fi

      - name: Debug archive
        if: always()
        run: |
          echo "=== Archive contents ==="
          find ios.xcarchive -type f -name "*.app" 2>/dev/null || echo "No .app found"
          find ios.xcarchive -maxdepth 3 -type d 2>/dev/null || echo "No archive directory"

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios.xcarchive/Products/Applications/*.app Payload/
          zip -r enterprise-mobile-app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: enterprise-mobile-app.ipa
