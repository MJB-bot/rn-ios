name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x node_modules/.bin/*

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          WORKSPACE="$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)"
          SCHEME="$(xcodebuild -list -workspace "$WORKSPACE" -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")"
          echo "Workspace: $WORKSPACE, Scheme: $SCHEME"
          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            -UseModernBuildSystem=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee xcodebuild.log | tail -60
          XCODE_EXIT=${PIPESTATUS[0]}
          echo "=== xcodebuild exit: $XCODE_EXIT ==="

      - name: Debug archive
        if: always()
        run: |
          echo "=== Archive contents ==="
          find ios.xcarchive -type f -name "*.app" 2>/dev/null || echo "No .app found"
          find ios.xcarchive -maxdepth 3 -type d 2>/dev/null || echo "No archive directory"

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios.xcarchive/Products/Applications/*.app Payload/
          zip -r enterprise-mobile-app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: enterprise-mobile-app.ipa
